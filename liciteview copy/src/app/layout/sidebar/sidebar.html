<div class="sidebar-container h-full flex flex-column p-3">
  
  <div class="logo-area flex align-items-center mb-6 px-3">
    <i class="pi pi-file-edit text-xl mr-2 text-900 font-bold"></i>
    <span class="text-xl font-bold text-900">LicitaView</span>
  </div>

  <div class="menu-area flex-1">
    <div class="text-xs text-500 font-medium mb-3 px-3 uppercase">Menu</div>
    <ul class="list-none p-0 m-0">
      <li *ngFor="let item of navItems" class="mb-2">
        <a [routerLink]="item.route" 
           routerLinkActive="active-link"
           class="flex align-items-center cursor-pointer p-3 border-round text-700 hover:surface-100 transition-duration-150 transition-colors text-decoration-none">
          <i [class]="item.icon + ' mr-3'"></i>
          <span class="font-medium">{{ item.label }}</span>
        </a>
      </li>
    </ul>
  </div>

</div>
