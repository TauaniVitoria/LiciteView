<div class="cadastro-container fadein animation-duration-200">
  
  <div class="page-header mb-4">
    <h1 class="page-title text-900">Cadastro do Fornecedor</h1>
    <p class="page-subtitle text-500">Informe os dados da sua empresa para personalizar as análises de viabilidade</p>
  </div>

  <div class="p-card border-1 border-gray-200 border-round-lg shadow-1 bg-white p-4 lg:p-5">
    
    <div class="flex align-items-center mb-4 pb-2">
      <i class="pi pi-building text-xl mr-2 text-700"></i>
      <h2 class="m-0 text-lg font-bold text-900">Cadastro do Fornecedor</h2>
    </div>

    <form [formGroup]="cadastroForm" (ngSubmit)="onSubmit()">
      
      <div class="grid mb-4">
        <div class="col-12 md:col-6">
          <label class="block text-sm font-semibold text-700 mb-2">Nome da Empresa</label>
          <input type="text" pInputText formControlName="nomeEmpresa" placeholder="Ex: Tech Solutions Ltda" class="w-full">
        </div>
        <div class="col-12 md:col-6">
          <label class="block text-sm font-semibold text-700 mb-2">CEP</label>
          <input type="text" pInputText formControlName="cep" placeholder="00000-000" class="w-full">
        </div>
        <div class="col-12 md:col-6">
          <label class="block text-sm font-semibold text-700 mb-2">Custo Médio de Produção (R$)</label>
          <p-inputNumber formControlName="custoMedio" placeholder="0" styleClass="w-full" class="w-full"></p-inputNumber>
        </div>
        <div class="col-12 md:col-6">
          <label class="block text-sm font-semibold text-700 mb-2">Margem Mínima Desejada (%)</label>
          <p-inputNumber formControlName="margemMinima" placeholder="10" styleClass="w-full" class="w-full"></p-inputNumber>
        </div>
      </div>

      <div class="mb-5">
        <label class="block text-sm font-semibold text-700 mb-3">Produtos / Categorias de Interesse</label>
        <div class="flex flex-wrap gap-2">
          <span *ngFor="let cat of categorias" 
                (click)="toggleCategoria(cat)"
                class="category-chip transition-colors transition-duration-150 cursor-pointer"
                [ngClass]="{'selected': cat.selected}">
            {{ cat.label }}
          </span>
        </div>
      </div>

      <div class="flex justify-content-start">
        <button pButton type="submit" label="Salvar Dados" icon="pi pi-save" class="p-button-dark"></button>
      </div>

    </form>
  </div>

</div>
